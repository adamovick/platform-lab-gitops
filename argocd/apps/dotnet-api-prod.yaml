apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dotnet-api-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/adamovick/platform-lab-gitops.git
    targetRevision: main
    path: environments/prod/dotnet-api

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
