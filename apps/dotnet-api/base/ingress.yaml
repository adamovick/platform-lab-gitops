apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-demo-api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - platform-demo.local
      secretName: platform-demo-tls
  rules:
    - host: platform-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-demo-api
                port:
                  number: 80
